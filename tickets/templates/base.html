<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Sistema de Tickets{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    {% load static %}
    <link rel="stylesheet" href="{% static 'css/custom.css' %}">
</head>

<body class="d-flex flex-column min-vh-100">

<nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container">

        <a class="navbar-brand d-flex align-items-center" href="#">
            <img src="{% static 'img/logo.png' %}" height="45" class="me-3">
            <strong>Sistema Integral de Gestion de Requerimientos</strong>
           <!-- Sistema Integral de Gestion de Requerimientos -->
        </a>

        <div class="collapse navbar-collapse justify-content-end">

            <ul class="navbar-nav ms-auto">

                {% if user.is_authenticated %}

                    <li class="nav-item">
                        <form method="post" action="{% url 'lista_tickets' %}" class="d-inline">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-outline-light btn-sm ms-2">
                                Menu principal
                            </button>
                        </form>
                    </li>

                    <li class="nav-item">
                        <form method="post" action="{% url 'logout' %}" class="d-inline">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-outline-light btn-sm ms-2">
                                Cerrar sesión
                            </button>
                        </form>
                    </li>

                {% endif %}

            </ul>

        </div>

    </div>
</nav>

<main class="flex-fill">
<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>
</main>

<footer class="text-center py-3" style="background-color:#156BA8; color:white;">
    <div class="container">
        © {{ now|date:"Y" }} SERVINSALUD IPS S.A.S - Todos los derechos reservados
    </div>
</footer>

</body>
</html>
